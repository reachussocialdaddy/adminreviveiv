<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookings | Revive IV Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-logo">
            <img src="assets/reviveiv-logo.png" alt="Revive IV Logo">
            <div class="sidebar-tagline">Admin Portal</div>
        </div>
        <ul class="nav-menu">
            <li><a href="dashboard.html" class="nav-item"><i class="fas fa-chart-line"></i> Overview</a></li>
            <li><a href="products.html" class="nav-item"><i class="fas fa-box"></i> Products & Pricing</a></li>
            <li><a href="bookings.html" class="nav-item active"><i class="fas fa-calendar-check"></i> Bookings</a></li>
            <li><a href="inquiries.html" class="nav-item"><i class="fas fa-envelope"></i> Inquiries</a></li>
        </ul>
        <button id="logout-btn" class="nav-item logout-btn"><i class="fas fa-sign-out-alt"></i> Sign Out</button>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <header class="page-header">
            <div>
                <h1 class="page-title">Bookings Received</h1>
                <p style="color: var(--text-secondary); margin-top:0.5rem;">View and manage all customer treatment appointments.</p>
            </div>
        </header>

        <div class="table-controls" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
            <h2 style="font-size: 1.2rem;">Recent Bookings</h2>
            <div class="search-box" style="position: relative; width: 300px;">
                <i class="fas fa-search" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-secondary);"></i>
                <input type="text" id="booking-search" placeholder="Search customer, id..." style="width: 100%; padding: 0.8rem 1rem 0.8rem 2.8rem; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 12px; color: white; outline: none;">
            </div>
        </div>
        <div class="table-container">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>Booking ID</th>
                        <th>Type</th>
                        <th>Customer</th>
                        <th>Service</th>
                        <th>Date & Time</th>
                        <th>Cost</th>
                        <th>Paid</th>
                        <th>Balance</th>
                        <th>Payment</th>
                        <th>Session</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="bookings-tbody">
                    <!-- Loaded via JS -->
                </tbody>
            </table>
        </div>
    </main>

    <script src="config.js"></script>
    <script src="mockData.js"></script>
    <script src="admin.js"></script>
</body>
</html>
