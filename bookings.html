<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookings | Revive IV Admin</title>
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-logo">
            <img src="assets/reviveiv-logo.png" alt="Revive IV Logo">
            <div class="sidebar-tagline">Admin Portal</div>
        </div>
        <ul class="nav-menu">
            <li><a href="dashboard.html" class="nav-item">Overview</a></li>
            <li><a href="products.html" class="nav-item">Products & Pricing</a></li>
            <li><a href="bookings.html" class="nav-item active">Bookings</a></li>
            <li><a href="inquiries.html" class="nav-item">Inquiries</a></li>
        </ul>
        <button id="logout-btn" class="nav-item logout-btn">Sign Out</button>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <header class="page-header">
            <div>
                <h1 class="page-title">Bookings Received</h1>
                <p style="color: var(--text-secondary); margin-top:0.5rem;">View and manage all customer treatment appointments.</p>
            </div>
        </header>

        <div class="table-container">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>Booking ID</th>
                        <th>Customer</th>
                        <th>Service</th>
                        <th>Date & Time</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="bookings-tbody">
                    <!-- Loaded via JS -->
                </tbody>
            </table>
        </div>
    </main>

    <script src="config.js"></script>
    <script src="admin.js"></script>
</body>
</html>
